name: PR Triage

# Automatically request review from dev-guide-admins when a PR is marked ready for review.
# This eliminates the need for contributors to manually find and assign reviewers.
on:
  pull_request_target:
    types: [ready_for_review]

permissions:
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  triage:
    name: Request review from triage team
    runs-on: ubuntu-latest

    steps:
      # Request review from the dev-guide-admins team on every ready-for-review PR
      - name: Request review from dev-guide-admins
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              team_reviewers: ['dev-guide-admins'],
            });
